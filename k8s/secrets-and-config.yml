# ── Secrets — sensitive keys (base64 encoded) ────────────────────────────────
# Populate with:
#   kubectl create secret generic verirag-secrets \
#     --from-literal=OPENAI_API_KEY=sk-... \
#     --from-literal=QDRANT_URL=https://... \
#     --from-literal=QDRANT_API_KEY=... \
#     --from-literal=TAVILY_API_KEY=tvly-... \
#     --from-literal=LANGSMITH_API_KEY=ls__... \
#     -n verirag
apiVersion: v1
kind: Secret
metadata:
  name: verirag-secrets
  namespace: verirag
type: Opaque
# Do NOT hardcode real values here — use kubectl create secret above
# or inject via CI/CD pipeline secrets
data: {}

---
# ── ConfigMap — non-sensitive config ─────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: verirag-config
  namespace: verirag
data:
  LANGSMITH_TRACING: "true"
  LANGSMITH_PROJECT: "VeriRAG"
  LANGSMITH_ENDPOINT: "https://api.smith.langchain.com"
  RATE_LIMIT_PER_MINUTE: "30"
  CHECKPOINT_DB: "checkpoints.db"
  # Streamlit reaches FastAPI via the k8s service name
  BACKEND_URL: "http://verirag-fastapi-service:8000"