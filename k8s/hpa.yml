# HPA only for FastAPI — Streamlit is lightweight frontend, no need to scale it
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: verirag-backend-hpa
  namespace: verirag
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: verirag-backend
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80