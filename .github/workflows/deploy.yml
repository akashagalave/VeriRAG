name: Deploy to EKS

on:
  push:
    branches:
      - main
    paths:
      # Only trigger when actual application code changes
      - "backend/**"
      - "app.py"
      - "Dockerfile.backend"
      - "Dockerfile.frontend"
      - "pyproject.toml"
      - "requirements.txt"
      - "k8s/**"

env:
  AWS_REGION:       ${{ secrets.AWS_REGION }}
  ECR_REGISTRY:     ${{ secrets.ECR_REGISTRY }}
  BACKEND_IMAGE:    verirag-backend
  FRONTEND_IMAGE:   verirag-frontend
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Configure AWS credentials ─────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      # ── 3. Login to ECR ───────────────────────────────────────────────────────
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── 4. Build and push backend image ──────────────────────────────────────
      - name: Build and push backend image
        run: |
          docker build \
            -f Dockerfile.backend \
            -t $ECR_REGISTRY/$BACKEND_IMAGE:$GITHUB_SHA \
            -t $ECR_REGISTRY/$BACKEND_IMAGE:latest \
            .
          docker push $ECR_REGISTRY/$BACKEND_IMAGE:$GITHUB_SHA
          docker push $ECR_REGISTRY/$BACKEND_IMAGE:latest

      # ── 5. Build and push frontend image ─────────────────────────────────────
      - name: Build and push frontend image
        run: |
          docker build \
            -f Dockerfile.frontend \
            -t $ECR_REGISTRY/$FRONTEND_IMAGE:$GITHUB_SHA \
            -t $ECR_REGISTRY/$FRONTEND_IMAGE:latest \
            .
          docker push $ECR_REGISTRY/$FRONTEND_IMAGE:$GITHUB_SHA
          docker push $ECR_REGISTRY/$FRONTEND_IMAGE:latest

      # ── 6. Update kubeconfig for EKS ─────────────────────────────────────────
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $EKS_CLUSTER_NAME

      # ── 7. Update image tags in deployments and apply ────────────────────────
      - name: Deploy to EKS
        run: |
          kubectl set image deployment/verirag-backend \
            backend=$ECR_REGISTRY/$BACKEND_IMAGE:$GITHUB_SHA \
            -n verirag

          kubectl set image deployment/verirag-frontend \
            frontend=$ECR_REGISTRY/$FRONTEND_IMAGE:$GITHUB_SHA \
            -n verirag

      # ── 8. Wait for rolling update to complete ───────────────────────────────
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/verirag-backend  -n verirag --timeout=120s
          kubectl rollout status deployment/verirag-frontend -n verirag --timeout=120s